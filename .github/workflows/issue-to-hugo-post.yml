name: Issue to Hugo post

on:
  issues:
    types:
      - opened
      - edited
      - reopened
      - labeled
      - unlabeled
  issue_comment:
    types:
      - created
      - edited
      - deleted

permissions:
  contents: write
  issues: read

concurrency:
  group: issue-to-hugo-content
  cancel-in-progress: false

env:
  HUGO_SOURCE_REF: hugo-source
  HUGO_PAGES_REF: master
  HUGO_VERSION: 0.148.2
  BLOG_AUTHOR_LOGINS: ${{ github.repository_owner }}

jobs:
  publish:
    if: >-
      ${{
        github.event.issue &&
        !github.event.issue.pull_request
      }}
    runs-on: ubuntu-latest

    steps:
      - name: Route issue event
        id: route
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          python3 - <<'PY'
          import json
          import os
          import urllib.request
          from pathlib import Path

          event_path = Path(os.environ["GITHUB_EVENT_PATH"])
          event = json.loads(event_path.read_text(encoding="utf-8"))
          issue = event["issue"]
          repo = os.environ["GITHUB_REPOSITORY"]
          token = os.environ["GITHUB_TOKEN"]

          request = urllib.request.Request(
              f"https://api.github.com/repos/{repo}/issues/{issue['number']}",
              headers={
                  "Accept": "application/vnd.github+json",
                  "Authorization": f"Bearer {token}",
                  "X-GitHub-Api-Version": "2022-11-28",
              },
          )
          with urllib.request.urlopen(request) as response:
              current_issue = json.load(response)

          labels = {str(label.get("name", "")).strip() for label in current_issue.get("labels", [])}
          labels_lower = {label.lower() for label in labels}
          author_logins = {
              login.strip().lower()
              for login in os.environ.get("BLOG_AUTHOR_LOGINS", "").split(",")
              if login.strip()
          }
          supported_kinds = {
              "kind:post",
              "kind:blog",
              "kind:book",
              "kind:watch",
              "kind:podcast",
              "kind:cat-pic",
          }
          has_kind = bool(labels_lower & supported_kinds)
          statuses = {label for label in labels_lower if label.startswith("status:")}
          should_run = has_kind and bool(statuses)
          is_delete = "status:deleted" in labels_lower
          comment = event.get("comment")
          if comment:
              comment_user = comment.get("user") or {}
              comment_login = str(comment_user.get("login", "")).strip().lower()
              comment_user_type = str(comment_user.get("type", "")).strip().lower()
              body_kinds = {"kind:post", "kind:cat-pic"}
              should_run = (
                  should_run
                  and bool(labels_lower & body_kinds)
                  and bool(author_logins)
                  and comment_login in author_logins
                  and comment_user_type != "bot"
              )

          normalized_event = dict(event)
          normalized_event["issue"] = current_issue
          normalized_path = Path(os.environ["RUNNER_TEMP"]) / "current-issue-event.json"
          normalized_path.write_text(json.dumps(normalized_event, ensure_ascii=False), encoding="utf-8")

          output_path = Path(os.environ["GITHUB_OUTPUT"])
          with output_path.open("a", encoding="utf-8") as output:
              output.write(f"should_run={'true' if should_run else 'false'}\n")
              output.write(f"is_delete={'true' if is_delete else 'false'}\n")
              output.write(f"event_path={normalized_path}\n")
          PY

      - name: Checkout pages branch
        if: steps.route.outputs.should_run == 'true'
        uses: actions/checkout@v4
        with:
          ref: ${{ env.HUGO_PAGES_REF }}
          path: site
          fetch-depth: 1
          sparse-checkout: |
            /*
            !/images/
          sparse-checkout-cone-mode: false

      - name: Checkout Hugo source branch
        if: steps.route.outputs.should_run == 'true'
        uses: actions/checkout@v4
        with:
          ref: ${{ env.HUGO_SOURCE_REF }}
          path: source
          fetch-depth: 0
          submodules: recursive

      - name: Set up Hugo
        if: steps.route.outputs.should_run == 'true'
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: ${{ env.HUGO_VERSION }}
          extended: true

      - name: Validate issue converter
        if: steps.route.outputs.should_run == 'true'
        run: python3 site/.github/scripts/test_issue_to_hugo_post.py

      - name: Convert issue to Markdown
        if: steps.route.outputs.should_run == 'true'
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: >
          python3 site/.github/scripts/issue_to_hugo_post.py
          "${{ steps.route.outputs.event_path }}"
          "source/content"

      - name: Normalize Hugo content
        if: steps.route.outputs.should_run == 'true'
        run: python3 site/.github/scripts/normalize_hugo_content.py source/content

      - name: Commit Hugo source changes
        if: steps.route.outputs.should_run == 'true'
        id: source_changes
        working-directory: source
        run: |
          if [ -z "$(git status --porcelain)" ]; then
            echo "No source changes."
            if [ "${{ steps.route.outputs.is_delete }}" = "true" ]; then
              echo "Deletion event with no source changes; build will still run to remove stale generated pages."
              echo "changed=true" >> "$GITHUB_OUTPUT"
            else
              echo "changed=false" >> "$GITHUB_OUTPUT"
            fi
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add content
          git commit -m "Update content from issue #${{ github.event.issue.number }}"
          git pull --rebase origin ${HUGO_SOURCE_REF}
          git push origin HEAD:${HUGO_SOURCE_REF} || {
            git fetch origin ${HUGO_SOURCE_REF}
            git rebase origin/${HUGO_SOURCE_REF}
            git push origin HEAD:${HUGO_SOURCE_REF}
          }
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Build Hugo site
        if: steps.source_changes.outputs.changed == 'true'
        run: hugo --source source --destination "$RUNNER_TEMP/hugo-site"

      - name: Sync generated site
        if: steps.source_changes.outputs.changed == 'true'
        run: |
          git -C site fetch origin ${HUGO_PAGES_REF}
          git -C site reset --hard origin/${HUGO_PAGES_REF}

          rsync -a --delete \
            --exclude='.git/' \
            --exclude='.github/' \
            --exclude='.gitignore' \
            --exclude='.gitmodules' \
            --exclude='CNAME' \
            --exclude='images/' \
            --exclude='myBlog/' \
            --exclude='myBlogCode/' \
            "$RUNNER_TEMP/hugo-site/" \
            site/

      - name: Commit generated site
        if: steps.source_changes.outputs.changed == 'true'
        working-directory: site
        run: |
          if [ -z "$(git status --porcelain)" ]; then
            echo "No generated site changes."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Publish issue #${{ github.event.issue.number }}"
          git push origin HEAD:${HUGO_PAGES_REF}
